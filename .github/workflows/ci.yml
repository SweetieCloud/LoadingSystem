name: Module 3 CI Pipeline
on:
  push:
    branches: [ "feature/*", "develop" ]
jobs:
  rust-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check Format
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy -- -D warnings

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Linter
        run: pip install pylint bandit
      - name: Run Pylint
        run: pylint src_pi_ai/loading_system_demo.py
